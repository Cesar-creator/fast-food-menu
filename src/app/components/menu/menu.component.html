<app-header></app-header>

<app-category-nav [categories]="categories" [activeId]="activeCategory" (categorySelected)="onCategorySelected($event)">
</app-category-nav>

<main class="menu-main">
  @for (cat of categories; track cat.id) {
  <section class="menu-section" [id]="cat.id">

    <div class="menu-section__header">
      <span class="menu-section__emoji">{{ cat.emoji }}</span>
      <h2 class="menu-section__title">{{ cat.name }}</h2>
      <div class="menu-section__line"></div>
    </div>

    <div class="menu-items">
      @for (item of cat.items; track item.id) {
      <article class="menu-item">

        @if (hasRealImage(item.image)) {
          <!-- Foto real: clickeable para abrir modal -->
          <div class="menu-item__image-wrap"
               (click)="openModal(getImagePath(item.image), item.name)"
               (keydown.enter)="openModal(getImagePath(item.image), item.name)"
               role="button"
               tabindex="0"
               [attr.aria-label]="'Ver foto de ' + item.name">
            <img class="menu-item__image"
                 [src]="getImagePath(item.image)"
                 [alt]="item.name"
                 loading="lazy"
                 (error)="onImageError($event)" />
            <div class="menu-item__zoom-hint" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </div>
          </div>
        } @else {
          <!-- Bloque de acento con emoji de categoría -->
          <div class="menu-item__accent" [style.background]="getCategoryGradient(cat.id)" aria-hidden="true">
            <span class="menu-item__accent-emoji">{{ cat.emoji }}</span>
          </div>
        }

        <!-- Info -->
        <div class="menu-item__body">
          <div class="menu-item__top">
            <h3 class="menu-item__name">{{ item.name }}</h3>
            <span class="menu-item__price">{{ item.price | cop }}</span>
          </div>
          <p class="menu-item__desc">{{ item.description }}</p>
        </div>

      </article>
      }
    </div>

  </section>
  }
</main>

<footer class="menu-footer">
</footer>

<!-- Modal de imagen -->
@if (modalImageSrc) {
  <div class="img-modal" (click)="closeModal()" role="dialog" aria-modal="true" [attr.aria-label]="'Foto de ' + modalImageName">
    <button class="img-modal__close" (click)="closeModal()" aria-label="Cerrar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <figure class="img-modal__content" (click)="$event.stopPropagation()">
      <img class="img-modal__img" [src]="modalImageSrc" [alt]="modalImageName" />
      <figcaption class="img-modal__caption">{{ modalImageName }}</figcaption>
    </figure>
  </div>
}
